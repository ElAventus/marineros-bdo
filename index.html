<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Marineros BDO</title>
<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0c0f;
    --panel: #111318;
    --panel2: #181c24;
    --border: #2a3040;
    --gold: #c8a84b;
    --gold2: #e8c86a;
    --teal: #4fc4b8;
    --overflow: #4a9eff;
    --red: #e05252;
    --probable: #e09a30;
    --viable: #d97b2e;
    --hard: #d45a20;
    --green: #52c46a;
    --text: #d4cfc5;
    --muted: #6a7080;
    --glow: rgba(200, 168, 75, 0.15);
    /* Colores por clase de marinero */
    --col-innocent:  #7ec8e3;
    --col-quick:     #a78bfa;
    --col-confident: #f9a84d;
    --col-realistic: #6ed9a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 17px;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(79, 196, 184, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(200, 168, 75, 0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(200,168,75,0.05) 0%, transparent 100%);
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(200,168,75,0.3);
  }

  header p {
    margin-top: 0.5rem;
    color: var(--muted);
    font-style: italic;
    font-size: 1.2rem;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  /* UPLOAD SECTION */
  .upload-section {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    background: var(--panel);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    position: relative;
  }
  .upload-section:hover, .upload-section.drag-over {
    border-color: var(--gold);
    background: var(--panel2);
  }
  .upload-section input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2.875rem; margin-bottom: 0.5rem; }
  .upload-section h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }
  .upload-section p { color: var(--muted); font-size: 1.035rem; }

  /* TYPE SELECT */
  .type-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
    justify-content: center;
  }
  .type-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.5rem 1.3rem;
    border-radius: 20px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .type-btn:hover { border-color: var(--teal); color: var(--teal); }
  .type-btn.active {
    background: rgba(79, 196, 184, 0.12);
    border-color: var(--teal);
    color: var(--teal);
    box-shadow: 0 0 10px rgba(79,196,184,0.18);
  }
  /* Color distinto por clase en el botón activo */
  .type-btn.active[data-type="Innocent"]  { background: rgba(126,200,227,0.13); border-color: var(--col-innocent);  color: var(--col-innocent); }
  .type-btn.active[data-type="Quick"]     { background: rgba(167,139,250,0.13); border-color: var(--col-quick);     color: var(--col-quick); }
  .type-btn.active[data-type="Confident"] { background: rgba(249,168,77,0.13);  border-color: var(--col-confident); color: var(--col-confident); }
  .type-btn.active[data-type="Realistic"] { background: rgba(110,217,160,0.13); border-color: var(--col-realistic); color: var(--col-realistic); }

  /* LEVEL SELECT */
  .level-row {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 1rem;
    justify-content: center;
    align-items: center;
  }
  .level-row label {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    margin-right: 0.4rem;
  }
  .level-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 40px; height: 40px;
    border-radius: 8px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .level-btn:hover { border-color: var(--teal); color: var(--teal); }
  .level-btn.active {
    background: rgba(79, 196, 184, 0.12);
    border-color: var(--teal);
    color: var(--teal);
    box-shadow: 0 0 8px rgba(79,196,184,0.2);
  }

  /* STAT INPUTS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 1.5rem;
  }
  @media (min-width: 700px) {
    .stats-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
  .stat-input-group {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
    transition: border-color 0.15s, opacity 0.2s;
  }
  .stat-input-group.excluded { opacity: 0.38; }
  .sig-header {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.45rem;
  }
  .sig-header input[type=checkbox] {
    accent-color: var(--teal);
    width: 13px; height: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sig-name {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .sig-name small {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'Inter', Arial, sans-serif;
    font-style: italic;
  }
  .sig-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.35rem;
  }
  .sig-cell label {
    display: block;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    margin-bottom: 0.15rem;
    text-transform: uppercase;
  }
  .sig-cell input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.38rem 0.5rem;
    border-radius: 5px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1.05rem;
    transition: border-color 0.15s;
  }
  .sig-cell input:focus { outline: none; border-color: var(--gold); }
  .sig-cell input.goal-inp:focus { border-color: var(--teal); }

  /* ANALYZE BTN */
  .analyze-btn {
    display: block;
    margin: 1.5rem auto 0;
    background: linear-gradient(135deg, rgba(79,196,184,0.15), rgba(79,196,184,0.08));
    border: 1.5px solid var(--teal);
    color: var(--teal);
    padding: 0.8rem 2.5rem;
    border-radius: 8px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(79,196,184,0.1);
  }
  .analyze-btn:hover {
    background: linear-gradient(135deg, rgba(79,196,184,0.25), rgba(79,196,184,0.15));
    box-shadow: 0 0 25px rgba(79,196,184,0.2);
    transform: translateY(-1px);
  }
  /* RESULTS */
  .results-section {
    margin-top: 2rem;
  }
  .results-title {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.02em;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .marinero-header {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .marinero-name {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold2);
  }
  .marinero-meta {
    color: var(--muted);
    font-size: 1.05rem;
    font-style: italic;
  }
  .marinero-level {
    background: rgba(79,196,184,0.1);
    border: 1px solid var(--teal);
    color: var(--teal);
    padding: 0.2rem 0.7rem;
    border-radius: 20px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .marinero-header-top {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    width: 100%;
  }
  .marinero-key-stats {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    width: 100%;
    margin-top: 0.5rem;
  }
  .key-stat-bubble {
    background: rgba(200,168,75,0.1);
    border: 1px solid rgba(200,168,75,0.45);
    color: var(--gold2);
    padding: 0.22rem 0.75rem;
    border-radius: 20px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .key-stat-bubble .ksb-label {
    color: var(--gold);
    font-size: 0.78rem;
    font-weight: 400;
  }
  .key-stat-bubble .ksb-val {
    color: var(--gold2);
    font-weight: 600;
  }

  .stat-cards {
    display: grid;
    gap: 0.7rem;
  }
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.1rem;
    display: grid;
    grid-template-columns: 1.3fr 0.62fr 0.62fr 0.95fr 1.05fr;
    align-items: start;
    gap: 0.5rem;
    transition: border-color 0.15s;
  }
  .stat-card.good     { border-left: 3px solid var(--green); }
  .stat-card.probable { border-left: 3px solid var(--probable); }
  .stat-card.viable   { border-left: 3px solid var(--viable); }
  .stat-card.hard     { border-left: 3px solid var(--hard); }
  .stat-card.bad      { border-left: 3px solid var(--red); }
  .stat-card.na       { border-left: 3px solid var(--border); opacity: 0.5; }

  .stat-name {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .stat-name small {
    display: block;
    color: var(--muted);
    font-size: 0.82rem;
    margin-top: 0.1rem;
    font-family: 'Inter', Arial, sans-serif;
    font-style: italic;
    font-weight: 400;
  }
  .stat-val {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 600;
  }
  .stat-val.current { color: var(--text); }
  .stat-val.goal { color: var(--muted); font-size: 1.1rem; }
  .stat-val.nextlv {
    text-align: center;
    font-family: 'Inter', Arial, sans-serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .stat-val.nextlv .nlv-range { color: var(--text); font-size: 1.1rem; font-style: normal; font-weight: 600; }
  .stat-val.nextlv .nlv-lv10  { font-size: 0.88rem; display: block; margin-top: 0.15rem; }
  .stat-val.nextlv .nlv-falta { font-size: 0.88rem; display: block; color: var(--muted); }
  .stat-range {
    text-align: center;
    font-size: 0.95rem;
    color: var(--muted);
  }
  .stat-status {
    text-align: right;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .stat-status.good     { color: var(--green); }
  .stat-status.probable { color: var(--probable); }
  .stat-status.viable   { color: var(--viable); }
  .stat-status.hard     { color: var(--hard); }
  .stat-status.bad      { color: var(--red); }
  .stat-status.na       { color: var(--muted); }

  .stat-detail {
    display: block;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: normal;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0;
    margin-top: 0.25rem;
    line-height: 1.45;
    white-space: normal;
  }
  .stat-detail .falta {
    display: block;
    font-size: 0.8rem;
  }

  .col-header {
    display: grid;
    grid-template-columns: 1.4fr 0.7fr 0.7fr 1.1fr 1fr;
    gap: 0.5rem;
    padding: 0.3rem 1.1rem;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .col-header span { text-align: center; }
  .col-header span:last-child { text-align: right; }

  /* Progress bar for projection */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 0.2rem;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-fill.good     { background: var(--green); }
  .progress-fill.probable { background: var(--probable); }
  .progress-fill.viable   { background: var(--viable); }
  .progress-fill.hard     { background: var(--hard); }
  .progress-fill.bad      { background: var(--red); }

  .summary-chips {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .chip {
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .chip.good     { background: rgba(82,196,106,0.1);  border: 1px solid var(--green);    color: var(--green); }
  .chip.probable { background: rgba(212,184,74,0.1);  border: 1px solid var(--probable); color: var(--probable); }
  .chip.viable   { background: rgba(217,123,46,0.1);  border: 1px solid var(--viable);   color: var(--viable); }
  .chip.hard     { background: rgba(184,64,32,0.12);  border: 1px solid var(--hard);     color: var(--hard); }
  .chip.bad      { background: rgba(224,82,82,0.1);   border: 1px solid var(--red);      color: var(--red); }

  /* AI IMAGE SECTION */
  .ai-section {
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .ai-section-header {
    background: var(--panel);
    padding: 0.8rem 1.2rem;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--teal);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .ai-section-body {
    padding: 1.2rem;
    background: var(--panel2);
  }
  .img-upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
  }
  .img-upload-zone:hover { border-color: var(--teal); }
  .img-upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-upload-zone p { color: var(--muted); font-size: 1.035rem; }
  .img-upload-zone .icon { font-size: 2.3rem; margin-bottom: 0.5rem; }

  #preview-img {
    max-width: 100%;
    max-height: 300px;
    display: none;
    border-radius: 8px;
    margin: 0 auto;
    display: block;
  }
  .analyze-img-btn {
    display: block;
    margin: 1rem auto 0;
    background: linear-gradient(135deg, rgba(79,196,184,0.1), rgba(79,196,184,0.05));
    border: 1.5px solid var(--teal);
    color: var(--teal);
    padding: 0.7rem 2rem;
    border-radius: 8px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .analyze-img-btn:hover {
    background: rgba(79,196,184,0.15);
    box-shadow: 0 0 15px rgba(79,196,184,0.15);
  }
  .analyze-img-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .ai-result {
    margin-top: 1rem;
    background: var(--panel);
    border-radius: 8px;
    padding: 1rem;
    font-size: 1.035rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    display: none;
  }

  .spinner {
    display: none;
    text-align: center;
    padding: 1rem;
    color: var(--teal);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  .hint-box {
    background: rgba(200,168,75,0.05);
    border: 1px solid rgba(200,168,75,0.2);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-size: 0.977rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 1rem;
  }
  .hint-box strong { color: var(--gold); font-style: normal; }

  /* Responsive */
  @media (max-width: 500px) {
    .stat-card {
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .stat-name { grid-column: 1 / -1; }
    .col-header { display: none; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Special / highlighted stats */
  .stat-card.special {
    background: linear-gradient(135deg, rgba(200,168,75,0.06) 0%, var(--panel) 60%);
    border-color: rgba(200,168,75,0.35);
  }
  .stat-card.special .stat-name {
    color: var(--gold2);
  }
  .stat-name .special-badge {
    display: inline-block;
    background: rgba(200,168,75,0.18);
    border: 1px solid rgba(200,168,75,0.45);
    color: var(--gold);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0.05rem 0.35rem;
    border-radius: 10px;
    margin-left: 0.4rem;
    vertical-align: middle;
    text-transform: uppercase;
  }

  /* Dual-segment progress bar (goal + overflow) */
  .progress-bar {
    position: relative;
  }
  .progress-bar.dual {
    display: flex;
    overflow: visible;
    background: var(--border);
  }
  .progress-fill-goal {
    height: 100%;
    border-radius: 2px 0 0 2px;
    background: #3dd68c;
    flex-shrink: 0;
  }
  .progress-fill-over {
    height: 100%;
    border-radius: 0 2px 2px 0;
    background: var(--overflow);
    flex-shrink: 0;
  }
  .progress-fill-short {
    height: 100%;
    border-radius: 2px;
    background: var(--border);
    flex-shrink: 0;
    /* the filled portion is the colored fill; the "short" sits as grey background */
  }
</style>
</head>
<body>

<header>
  <h1>⚓ Analizador de Marineros</h1>
  <p>Black Desert — Evalúa si tu marinero va en buen camino</p>
</header>

<div class="container">

  <!-- MODO 1: Entrada Manual -->
  <div class="results-title">📊 Análisis manual de stats</div>

  <div>
    <div class="type-row" id="type-selector">
      <button class="type-btn active" data-type="Innocent">Inocente</button>
      <button class="type-btn" data-type="Quick">Rápido</button>
      <button class="type-btn" data-type="Confident">Confiado</button>
      <button class="type-btn" data-type="Realistic">Realista</button>
    </div>

    <div class="level-row">
      <label>Nivel actual:</label>
      <button class="level-btn active" data-level="1">1</button>
      <button class="level-btn" data-level="2">2</button>
      <button class="level-btn" data-level="3">3</button>
      <button class="level-btn" data-level="4">4</button>
      <button class="level-btn" data-level="5">5</button>
      <button class="level-btn" data-level="6">6</button>
      <button class="level-btn" data-level="7">7</button>
      <button class="level-btn" data-level="8">8</button>
      <button class="level-btn" data-level="9">9</button>

function buildStatInputs(type) {
  const grid = document.getElementById('stats-inputs');
  grid.innerHTML = '';
  const goals = GOALS[type || currentType];
  STAT_KEYS.forEach(key => {
    const info = STAT_NAMES_ES[key];
    const goalVal = goals[key] || 0;
    const hasGoal = goalVal > 0;
    const safeId = key.replace(/[^a-z]/gi,'_');
    const div = document.createElement('div');
    div.className = 'stat-input-group' + (hasGoal ? '' : ' excluded');
    div.id = `group-${safeId}`;
    div.innerHTML = `
      <div class="sig-header">
        <input type="checkbox" data-enabled="${key}" ${hasGoal ? 'checked' : ''}>
        <span class="sig-name">${info.es}<small>${key.split('(')[1]?.replace(')','') || ''}</small></span>
      </div>
      <div class="sig-inputs">
        <div class="sig-cell">
          <label>Valor</label>
          <input type="number" step="0.1" min="0" placeholder="0.0" data-stat="${key}">
        </div>
        <div class="sig-cell">
          <label>Meta</label>
          <input type="number" step="0.1" min="0" placeholder="—" class="goal-inp" data-goal="${key}" value="${hasGoal ? goalVal : ''}">
        </div>
      </div>
    `;
    // Toggle excluded class when checkbox changes
    div.querySelector('[data-enabled]').addEventListener('change', e => {
      div.classList.toggle('excluded', !e.target.checked);
    });
    grid.appendChild(div);
  });
}
buildStatInputs();

function updateGoalInputs(type) {
  const goals = GOALS[type];
  STAT_KEYS.forEach(key => {
    const goalInp = document.querySelector(`[data-goal="${key}"]`);
    const enabledInp = document.querySelector(`[data-enabled="${key}"]`);
    const safeId = key.replace(/[^a-z]/gi,'_');
    const group = document.getElementById(`group-${safeId}`);
    if (goalInp) goalInp.value = goals[key] > 0 ? goals[key] : '';
    if (enabledInp) {
      enabledInp.checked = goals[key] > 0;
      group?.classList.toggle('excluded', !enabledInp.checked);
    }
  });
}

function readGoalsEnabled() {
  const customGoals = {};
  const enabledKeys = new Set();
  STAT_KEYS.forEach(key => {
    const goalVal = parseFloat(document.querySelector(`[data-goal="${key}"]`)?.value) || 0;
    customGoals[key] = goalVal;
    const checked = document.querySelector(`[data-enabled="${key}"]`)?.checked;
    if (checked && goalVal > 0) enabledKeys.add(key);
  });
  return { customGoals, enabledKeys };
}

// ===================== ANALYSIS =====================
function analyze(type, level, stats, customGoals, enabledKeys) {
  const defaultGoals = GOALS[type];
  const minAtLv = MIN_STATS[type];
  const maxLv10 = MAX_LV10[type];

  const results = [];
  STAT_KEYS.forEach(key => {
    const val = parseFloat(stats[key]) || 0;
    const goal = customGoals ? (customGoals[key] || 0) : (defaultGoals[key] || 0);
    const minLv10 = minAtLv[key][9];
    const maxLv10val = maxLv10[key] || 0;

    // Skip if no goal or stat excluded
    if (goal === 0 || (enabledKeys && !enabledKeys.has(key))) {
      results.push({ key, val, goal, minLv10, maxLv10val, status: 'na', projection: null });
      return;
    }

    // --- Crecimiento restante hasta lv10 (datos exactos del Excel) ---
    const maxStatsAtLv = MAX_STATS[type];
    const maxGrowthAtLv = MAX_GROWTH[type];

    // minRemaining: suma de Min Growth desde el próximo nivel hasta lv10
    //   = MIN_STATS[lv10] − MIN_STATS[nivel actual]
    const minRemaining = Math.max(0, minLv10 - minAtLv[key][level - 1]);

    // maxRemaining: suma de Max Growth desde el próximo nivel hasta lv10
    //   = MAX_STATS[lv10] − MAX_STATS[nivel actual]
    //   Esto refleja exactamente el rango del Excel por nivel
    const maxRemaining = Math.max(0, maxStatsAtLv[key][9] - maxStatsAtLv[key][level - 1]);

    const projectedMin = val + minRemaining;
    const projectedMax = val + maxRemaining;

    // needed: cuánto le falta crecer para llegar a la meta
    const needed = Math.max(0, goal - val);

    let status;
    if (level === 10) {
      // Nivel máximo: comparación directa, sin proyecciones
      status = val >= goal ? 'good' : 'bad';
    } else {
      if (needed <= 0) {
        // Ya superó la meta
        status = 'good';
      } else if (maxRemaining < needed) {
        // Ni en el mejor caso llega: imposible
        status = 'bad';
      } else if (minRemaining >= needed) {
        // Llega incluso sacando el mínimo: garantizado
        status = 'good';
      } else {
        // needed cae dentro del tramo incierto [minRemaining, maxRemaining]
        // Dividimos ese tramo en 3 zonas:
        //   primer 40%  → Probable  (necesita poco más del mínimo)
        //   siguiente 35% → Viable
        //   último 25%  → Difícil   (necesita casi el máximo posible)
        const rangeSize  = maxRemaining - minRemaining;
        const posInRange = needed - minRemaining;
        const ratio      = rangeSize > 0 ? posInRange / rangeSize : 1;

        if      (ratio < 0.40) status = 'probable';
        else if (ratio < 0.75) status = 'viable';
        else                   status = 'hard';
      }
    }

    // Rango de crecimiento del PRÓXIMO nivel — datos exactos del Excel
    let nextLvMin = 0, nextLvMax = 0;
    if (level < 10) {
      // Min del próximo nivel = diferencia entre mínimos acumulados consecutivos
      nextLvMin = Math.max(0, minAtLv[key][level] - minAtLv[key][level - 1]);
      // Max del próximo nivel = dato exacto de MAX_GROWTH[level] (índice = nivel en 0-based)
      nextLvMax = MAX_GROWTH[type][key][level];
    }

        // Progress: how far along toward goal is current value
    const progress = goal > 0 ? Math.min(100, (val / goal) * 100) : 0;

    results.push({ key, val, goal, minLv10, maxLv10val, projectedMin, projectedMax, nextLvMin, nextLvMax, minRemaining, maxRemaining, status, progress });
  });
  return results;
}


// Special / signature stats per sailor type
const SPECIAL_STATS = {
  Innocent:  ['Endurance (Speed)'],
  Realistic: ['Awareness (Turn)', 'Vision (Angle)'],
  Quick:     ['Strength (Brake)', 'Wits (Acceleration)'],
  Confident: ['Awareness (Turn)', 'Endurance (Speed)'],
};

function renderResults(type, level, results, container) {
  const typeName = { Innocent: 'Inocente', Quick: 'Rápido', Confident: 'Confiado', Realistic: 'Realista' }[type];
  const typeColor = { Innocent: 'var(--col-innocent)', Quick: 'var(--col-quick)', Confident: 'var(--col-confident)', Realistic: 'var(--col-realistic)' }[type];
  const typeColorRgb = { Innocent: '126,200,227', Quick: '167,139,250', Confident: '249,168,77', Realistic: '110,217,160' }[type];

  const good     = results.filter(r => r.status === 'good').map(r => STAT_NAMES_ES[r.key].es);
  const probable = results.filter(r => r.status === 'probable').map(r => STAT_NAMES_ES[r.key].es);
  const viable   = results.filter(r => r.status === 'viable').map(r => STAT_NAMES_ES[r.key].es);
  const hard     = results.filter(r => r.status === 'hard').map(r => STAT_NAMES_ES[r.key].es);
  const bad      = results.filter(r => r.status === 'bad').map(r => STAT_NAMES_ES[r.key].es);

  const isMaxLevel = level === 10;
  const chipGoodLabel = isMaxLevel ? '✓ Logrado' : '✓ Garantizado';
  const chipBadLabel  = isMaxLevel ? '✗ No logrado' : '✗ Imposible';

  // Chips HTML (se renderiza al final)
  const chipsHtml = `
    <div class="summary-chips" style="margin-top:1rem">
      ${good.length     ? `<span class="chip good">${chipGoodLabel}: ${good.join(', ')}</span>` : ''}
      ${!isMaxLevel && probable.length ? `<span class="chip probable">≈ Probable: ${probable.join(', ')}</span>` : ''}
      ${!isMaxLevel && viable.length   ? `<span class="chip viable">⚠ Viable: ${viable.join(', ')}</span>` : ''}
      ${!isMaxLevel && hard.length     ? `<span class="chip hard">⚠ Difícil: ${hard.join(', ')}</span>` : ''}
      ${bad.length      ? `<span class="chip bad">${chipBadLabel}: ${bad.join(', ')}</span>` : ''}
    </div>`;

  let html = `
    <div class="marinero-header" style="border-color:rgba(${typeColorRgb},0.35);flex-direction:column;align-items:flex-start">
      <div class="marinero-header-top">
        <span class="marinero-name" style="color:${typeColor}">Marinero ${typeName}</span>
        <span class="marinero-level">Nivel ${level}</span>
        ${level === 10 ? `<span style="color:${typeColor};font-family:Cinzel,serif;font-size:0.85rem">★ Máximo</span>` : ''}
      </div>
      <div class="marinero-key-stats">
        ${(SPECIAL_STATS[type] || []).map(key => {
          const r = results.find(x => x.key === key);
          const label = STAT_NAMES_ES[key]?.esShort || STAT_NAMES_ES[key]?.es || key;
          const showVal = isMaxLevel && r && r.goal > 0 && r.val >= r.goal;
          return `<span class="key-stat-bubble">
            <span class="ksb-label">★ ${label}</span>
            ${showVal ? `<span class="ksb-val">${r.val.toFixed(1)}</span>` : ''}
          </span>`;
        }).join('')}
      </div>
    </div>
    <div class="col-header" style="margin-top:1rem">
      <span style="text-align:left">Stat</span>
      <span>Actual</span>
      <span>Meta</span>
      <span>Crecimiento</span>
      <span>Estado</span>
    </div>
    <div class="stat-cards">
  `;

  const specialKeys = SPECIAL_STATS[type] || [];

  results.forEach(r => {
    if (r.status === 'na') return;
    const name = STAT_NAMES_ES[r.key];
    const isSpecial = specialKeys.includes(r.key);
    const isOver = isMaxLevel && r.goal > 0 && r.val > r.goal;
    const statusText = isMaxLevel
      ? (r.status === 'good' ? (isOver ? '★ Superado' : '✓ Logrado') : r.status === 'bad' ? '✗ No logrado' : '—')
      : ({ good: '✓ Garantizado', probable: '≈ Probable', viable: '⚠ Viable', hard: '⚠ Difícil', bad: '✗ Imposible' }[r.status] || '—');

    // ---- Progress bar ----
    let barHtml;
    if (isMaxLevel && r.goal > 0) {
      const goalPct  = Math.min(100, (r.goal / Math.max(r.val, r.goal)) * 100);
      if (r.val >= r.goal) {
        // Superó la meta: verde hasta meta, teal para el exceso
        const overPct = Math.min(40, ((r.val - r.goal) / r.goal) * 100); // cap overflow visual at 40% extra
        const greenPct = 100 - overPct;
        barHtml = `<div class="progress-bar dual" style="height:7px;border-radius:3px;overflow:hidden;box-shadow:0 0 6px rgba(74,158,255,0.3)">` +
          `<div class="progress-fill-goal" style="width:${greenPct.toFixed(1)}%"></div>` +
          `<div class="progress-fill-over" style="width:${overPct.toFixed(1)}%"></div>` +
          `</div>`;
      } else {
        // No llegó: barra de color hasta lo que tiene, el resto queda en gris
        const filledPct = (r.val / r.goal) * 100;
        const shortPct  = 100 - filledPct;
        barHtml = `<div class="progress-bar" style="height:7px;border-radius:3px;overflow:hidden;background:var(--border)">` +
          `<div class="progress-fill bad" style="width:${filledPct.toFixed(1)}%;border-radius:2px"></div>` +
          `</div>`;
      }
    } else {
      const pct = Math.min(100, r.progress || 0);
      barHtml = `<div class="progress-bar" style="height:7px;border-radius:3px"><div class="progress-fill ${r.status}" style="width:${pct}%;border-radius:3px"></div></div>`;
    }

    // ---- Growth column ----
    let growthHtml = '<div class="stat-val nextlv">—</div>';
    if (isMaxLevel && r.goal > 0) {
      const diff = r.val - r.goal;
      const sign = diff >= 0 ? '+' : '';
      const diffColor = diff > 0 ? 'var(--overflow)' : diff === 0 ? 'var(--green)' : 'var(--red)';
      growthHtml = `<div class="stat-val nextlv" style="font-style:normal">
        <span style="color:${diffColor};font-size:1.05rem;font-weight:600">${sign}${diff.toFixed(1)}</span>
        <span style="display:block;font-size:0.78rem;color:var(--muted);font-style:italic">${diff > 0 ? 'Sobre meta' : diff === 0 ? 'Meta exacta' : 'Bajo meta'}</span>
      </div>`;
    } else if (!isMaxLevel && r.nextLvMin !== undefined && r.status !== 'na') {
      const needed = Math.max(0, r.goal - r.val);
      // Todos los niveles: suma acumulada de min y max restantes hasta lv10
      const minTot = r.minRemaining.toFixed(1);
      const maxTot = r.maxRemaining.toFixed(1);
      const levelsLeft = 10 - level;
      growthHtml = `
        <div class="stat-val nextlv">
          <span class="nlv-range">+${minTot} – +${maxTot}</span>
          <span class="nlv-falta" style="color:var(--muted);font-size:0.75rem">${levelsLeft} nivel${levelsLeft > 1 ? 'es' : ''} · Falta: +${needed.toFixed(1)}</span>
        </div>`;
    }

    const specialBadge = isSpecial ? '<span class="special-badge">★ Clave</span>' : '';

    html += `
      <div class="stat-card ${r.status}${isSpecial ? ' special' : ''}">
        <div class="stat-name">
          ${name.es}${specialBadge}
          <small>${name.esShort || name.enShort}</small>
          ${barHtml}
        </div>
        <div class="stat-val current">${r.val.toFixed(1)}</div>
        <div class="stat-val goal">${r.goal.toFixed(1)}</div>
        ${growthHtml}
        <div class="stat-status ${r.status}" style="${isOver ? 'color:var(--overflow)' : ''}">${statusText}</div>
      </div>
    `;
  });

  // Also show NA stats briefly
  const naStats = results.filter(r => r.status === 'na' && r.val > 0);
  if (naStats.length) {
    html += `<div style="margin-top:0.5rem;color:var(--muted);font-size:0.85rem;font-style:italic;padding-left:1rem">Stats sin meta asignada: ${naStats.map(r => `${STAT_NAMES_ES[r.key].es} (${r.val.toFixed(1)})`).join(', ')}</div>`;
  }

  html += `</div>`;
  // Chips al final
  html += chipsHtml;
  container.innerHTML = html;
  container.style.display = 'block';
}

document.getElementById('analyze-manual-btn').addEventListener('click', () => {
  const stats = {};
  STAT_KEYS.forEach(key => {
    const inp = document.querySelector(`[data-stat="${key}"]`);
    stats[key] = parseFloat(inp?.value) || 0;
  });
  const { customGoals, enabledKeys } = readGoalsEnabled();
  const results = analyze(currentType, currentLevel, stats, customGoals, enabledKeys);
  renderResults(currentType, currentLevel, results, document.getElementById('manual-results'));
  document.getElementById('manual-results').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// ===================== IMAGE ANALYSIS (TESSERACT OCR) =====================
const imgInput      = document.getElementById('img-input');
const previewImg    = document.getElementById('preview-img');
const analyzeImgBtn = document.getElementById('analyze-img-btn');
const aiResult      = document.getElementById('ai-result');
const spinner       = document.getElementById('spinner');

imgInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadImageFile(file);
});

document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) loadImageFile(file);
      break;
    }
  }
});

function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    previewImg.src = ev.target.result;
    previewImg.style.display = 'block';
    analyzeImgBtn.disabled = false;
    aiResult.style.display = 'none';
    document.getElementById('img-zone').scrollIntoView({ behavior: 'smooth', block: 'center' });
  };
  reader.readAsDataURL(file);
}

// --- Preprocesamiento de imagen para mejorar OCR ---
function preprocessForOCR(img) {
  const SCALE = 3;
  const c   = document.createElement('canvas');
  c.width   = img.naturalWidth  * SCALE;
  c.height  = img.naturalHeight * SCALE;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, c.width, c.height);

  const id = ctx.getImageData(0, 0, c.width, c.height);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    // Escala de grises
    const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    // Umbral: el texto del juego es claro sobre fondo oscuro
    // Subimos el umbral a 120 para capturar mejor el texto gris claro
    const v = gray > 120 ? 255 : 0;
    d[i] = d[i + 1] = d[i + 2] = v;
    d[i + 3] = 255;
  }
  ctx.putImageData(id, 0, 0);
  return c;
}

// --- Parseo del texto OCR ---
function parseOCRText(rawText) {
  // Normalizar: reemplazar caracteres raros producidos por OCR
  const text = rawText
    .replace(/[|l1]/g, match => match) // preservar para análisis
    .replace(/\r/g, '');

  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const full  = text.toLowerCase();

  // --- Tipo ---
  const TYPE_KW = {
    Innocent:  ['inocente', 'innocent'],
    Quick:     ['rápido', 'rapido', 'quick'],
    Confident: ['confiado', 'confident', 'seguro'],
    Realistic: ['realista', 'realistic'],
  };
  let tipo = null;
  outer: for (const [t, kws] of Object.entries(TYPE_KW)) {
    for (const kw of kws) {
      if (full.includes(kw)) { tipo = t; break outer; }
    }
  }
  if (!tipo) tipo = 'Innocent';

  // --- Nivel ---
  const lvMatch = text.match(/[Ll][vV][\s.]*(\d{1,2})/);
  const nivel   = lvMatch ? Math.min(10, Math.max(1, parseInt(lvMatch[1]))) : 1;

  // --- Nombre ---
  const nameMatch = text.match(/[Ll][vV][\s.]*\d+\s+([A-Za-záéíóúñÁÉÍÓÚÑ]{2,})/);
  const nombre    = nameMatch ? nameMatch[1] : null;

  // --- Stats ---
  // Para cada stat buscamos la línea que contenga la palabra clave
  // y extraemos el número con formato X.X o XX.X
  const STAT_DEF = [
    { key: 'Endurance (Speed)',   needles: ['persisten'] },
    { key: 'Wits (Acceleration)', needles: ['astucia', 'astuc'] },
    { key: 'Awareness (Turn)',    needles: ['instinto', 'instin'] },
    { key: 'Strength (Brake)',    needles: ['fuerza'] },
    { key: 'Patience (Reload)',   needles: ['paciencia', 'pacien'] },
    { key: 'Force (Range)',       needles: ['vigor'] },
    { key: 'Focus (Accuracy)',    needles: ['concentr', 'concent'] },
    { key: 'Vision (Angle)',      needles: ['visión', 'vision', 'visio'] },
  ];

  const stats = {};

  for (const sp of STAT_DEF) {
    stats[sp.key] = 0; // valor por defecto
    for (const line of lines) {
      const ll = line.toLowerCase();
      if (!sp.needles.some(n => ll.includes(n))) continue;

      // Intentar extraer número decimal: "3.9" / "3,9" / "3 9" / "39"
      // Primero intentar con separador decimal explícito
      let numMatch = line.match(/(\d{1,3})[.,](\d)/);
      if (numMatch) {
        const val = parseFloat(numMatch[1] + '.' + numMatch[2]);
        if (val >= 0 && val <= 100) { stats[sp.key] = val; break; }
      }
      // Si no, buscar número simple al final de la línea (puede que el punto no se detectó)
      numMatch = line.match(/\b(\d{1,3})\s*%?\s*$/);
      if (numMatch) {
        // Para valores como "39" que deberían ser "3.9", dividimos por 10 si > 10 y stat no es Visión
        let val = parseFloat(numMatch[1]);
        if (val > 10 && sp.key !== 'Vision (Angle)') val = val / 10;
        if (val >= 0 && val <= 100) { stats[sp.key] = val; break; }
      }
    }
  }

  return { tipo, nivel, nombre, stats };
}

// --- Rellenar UI con datos detectados ---
function applyParsedData(parsed) {
  const { tipo, nivel, nombre, stats } = parsed;

  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === tipo);
  });
  currentType = tipo;
  updateGoalInputs(tipo);

  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.level) === nivel);
  });
  currentLevel = nivel;

  STAT_KEYS.forEach(key => {
    const inp = document.querySelector(`[data-stat="${key}"]`);
    if (inp) inp.value = stats[key] > 0 ? stats[key] : '';
  });

  const { customGoals, enabledKeys } = readGoalsEnabled();
  const results = analyze(tipo, nivel, stats, customGoals, enabledKeys);

  const typeName = { Innocent: 'Inocente', Quick: 'Rápido', Confident: 'Confiado', Realistic: 'Realista' }[tipo];

  // Contar cuántos stats se detectaron correctamente
  const detected = Object.values(stats).filter(v => v > 0).length;
  const total    = STAT_KEYS.length;

  const resultDiv = document.getElementById('ai-result');
  resultDiv.style.display = 'block';

  let statusColor = detected >= 6 ? 'var(--teal)' : detected >= 3 ? 'var(--probable)' : 'var(--red)';
  let html = `<div style="color:${statusColor};font-size:0.9rem;margin-bottom:0.8rem">
    ✓ OCR completado — ${typeName} Lv.${nivel}${nombre ? ` — ${nombre}` : ''} — ${detected}/${total} stats detectados
  </div>`;

  html += `<div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.5rem">Stats leídos:</div>`;
  STAT_KEYS.forEach(key => {
    const v = stats[key];
    const color = v > 0 ? 'var(--text)' : 'var(--red)';
    const label = v > 0 ? v.toFixed(1) : '⚠ no detectado';
    html += `<div style="font-size:0.88rem;margin-bottom:0.15rem;color:${color}">${STAT_NAMES_ES[key].es}: <strong>${label}</strong></div>`;
  });

  if (detected < total) {
    html += `<div style="margin-top:0.6rem;font-size:0.82rem;color:var(--muted);font-style:italic">
      Los stats no detectados quedaron en 0. Puedes corregirlos manualmente arriba antes de analizar.
    </div>`;
  }

  resultDiv.innerHTML = html;

  renderResults(tipo, nivel, results, document.getElementById('manual-results'));
  document.getElementById('manual-results').style.display = 'block';
  document.getElementById('manual-results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

analyzeImgBtn.addEventListener('click', async () => {
  if (!previewImg.src || previewImg.src === window.location.href) return;
  analyzeImgBtn.disabled = true;
  spinner.style.display   = 'block';
  aiResult.style.display  = 'none';
  spinner.textContent     = '⚓ Procesando imagen…';

  try {
    // Preprocesar imagen para mejorar la detección
    const canvas = preprocessForOCR(previewImg);

    spinner.textContent = '⚓ Leyendo texto (OCR)…';

    // Correr Tesseract con español
    const result = await Tesseract.recognize(canvas, 'spa', {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round(m.progress * 100);
          spinner.textContent = `⚓ Leyendo texto… ${pct}%`;
        }
      },
      tessedit_pageseg_mode: '6',          // Bloque de texto uniforme
      preserve_interword_spaces: '1',
    });

    console.log('[OCR] Texto crudo:\n', result.data.text);

    const parsed = parseOCRText(result.data.text);
    applyParsedData(parsed);

  } catch (err) {
    console.error('[OCR] Error:', err);
    aiResult.style.display = 'block';
    aiResult.innerHTML = `<span style="color:var(--red)">Error al analizar la imagen: ${err.message}</span>`;
  } finally {
    spinner.style.display  = 'none';
    spinner.textContent    = '⚓ Analizando imagen…';
    analyzeImgBtn.disabled = false;
  }
});
</script>
